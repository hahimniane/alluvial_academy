name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture:
    name: Architecture check (AGENTS.md)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need enough history to diff against base branch
          fetch-depth: 0

      - name: Enforce directory rules on new files
        run: bash scripts/ci/check_architecture.sh

  flutter:
    name: Flutter (analyze / test / build web)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show versions
        run: |
          flutter --version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      # Formatting is a soft check while the codebase is being cleaned up.
      # Track: https://github.com/hahimniane/alluvial_academy/issues (TECH-DEBT: formatting)
      - name: Verify formatting (non-blocking)
        continue-on-error: true
        run: dart format --output=none --set-exit-if-changed .

      # Analyze: hard-fail on ERRORS only (there are ~0 today, ~2000 warnings/infos
      # that are pre-existing tech debt and should be burned down over time).
      - name: Static analysis (errors only)
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      # Surface warnings/infos count as a signal without failing the build.
      - name: Analyzer warnings report (non-blocking)
        continue-on-error: true
        run: flutter analyze

      - name: Run unit / widget tests
        run: flutter test --no-pub

      - name: Build web (release)
        run: flutter build web --release

  functions:
    name: Firebase Functions (lint / test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (if configured)
        run: npm run lint --if-present

      - name: Run tests
        run: npm test -- --ci
