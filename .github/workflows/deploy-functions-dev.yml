name: Deploy Functions (dev)

# Auto-deploys Cloud Functions to the `alluwal-dev` Firebase project
# whenever a PR is merged into `main` that touches functions/ code.
#
# Safety: only runs on direct pushes to `main` (which, under branch protection,
# only happen via merged PRs). Never runs on branches or PRs.

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.github/workflows/deploy-functions-dev.yml'

concurrency:
  group: deploy-functions-dev
  cancel-in-progress: false   # never cancel a deploy mid-flight

jobs:
  deploy:
    name: Deploy Functions to alluwal-dev
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Run tests before deploying
        working-directory: functions
        run: npm test -- --ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALLUWAL_DEV }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Deploy to alluwal-dev
        run: firebase deploy --only functions --project alluwal-dev --non-interactive --force

      - name: Report
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Functions deployed to alluwal-dev"
            echo "Console: https://console.firebase.google.com/project/alluwal-dev/functions"
          else
            echo "❌ Deploy failed. Check the logs above."
          fi
